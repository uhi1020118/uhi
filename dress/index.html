<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우히 · 옷장</title>
<link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/10/1020118/1020118.jpg">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Sacramento&family=Parisienne&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  :root{--transition:.2s;--shadow:0 6px 18px rgba(20,60,85,.10);--radius-md:12px}
  body.dark{--shadow:0 6px 18px rgba(0,0,0,.4)}

  .mode-seg{display:inline-flex;background:var(--main-light);border-radius:999px;padding:4px;gap:4px;margin:22px 0 16px}
  .seg-btn{border:none;background:transparent;color:var(--main-dark);font-size:14px;font-weight:700;padding:9px 18px;border-radius:999px;cursor:pointer;transition:all var(--transition);white-space:nowrap}
  .seg-btn:hover{opacity:.8}
  .seg-btn.active{background:var(--main-dark);color:#fff;box-shadow:var(--shadow)}
  body.dark .seg-btn.active{color:#0b2230}

  .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .cat-tab{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;border-radius:999px;border:1.5px solid var(--rule);background:var(--card);color:var(--main-dark);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition)}
  .cat-tab:hover{border-color:var(--main)}
  .cat-tab.active{background:var(--main);color:#06384f;border-color:var(--main)}
  body.dark .cat-tab.active{color:#0b2230}
  .cat-tab .cnt{font-size:11px;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:var(--main-light);color:var(--main-dark)}
  .cat-tab.active .cnt{background:rgba(0,0,0,.16);color:#06384f}

  .zoom-hint{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.34);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity var(--transition);z-index:2}

  /* 새 옷 = 포스터 벽 */
  .poster-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-bottom:2px solid var(--main-dark);padding-bottom:8px;margin-bottom:22px}
  .poster-head .ph-t{font-family:var(--katuri);font-weight:800;font-size:32px;line-height:.95;letter-spacing:1px;background:linear-gradient(90deg,var(--main-dark),var(--main));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .poster-head .ph-m{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--text-soft);white-space:nowrap;padding-bottom:5px}
  .poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:900px){.poster-grid{grid-template-columns:repeat(2,1fr);gap:14px}}
  @media(max-width:520px){.poster-grid{grid-template-columns:1fr;gap:18px}}
  .poster{position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;cursor:pointer;background:#0b1722;box-shadow:var(--shadow);transition:transform var(--transition),box-shadow var(--transition)}
  .poster:hover{transform:translateY(-6px);box-shadow:var(--shadow-hover)}
  .poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
  .poster:hover img{transform:scale(1.06)}
  .poster .ph-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:46px;opacity:.4;color:#fff}
  .poster::before{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,.5),transparent 26%,transparent 50%,rgba(0,0,0,.88))}
  .poster .frame{position:absolute;inset:10px;border:1.5px solid rgba(255,255,255,.55);border-radius:5px;z-index:3;pointer-events:none}
  .poster .p-top{position:absolute;top:0;left:0;right:0;z-index:4;padding:16px 17px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;color:#fff}
  .poster .p-brand{font-size:11px;font-weight:800;letter-spacing:.24em;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .poster .p-new{font-size:10px;font-weight:800;letter-spacing:.08em;background:var(--main-dark);color:#fff;padding:3px 10px;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.45);display:inline-flex;align-items:center;gap:4px}
  .poster .p-bottom{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:18px 18px 19px;color:#fff}
  .poster .p-cat{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.06em;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);padding:3px 11px;border-radius:999px;margin-bottom:11px}
  .poster .p-line{width:26px;height:2.5px;background:var(--main);margin-bottom:10px;border-radius:2px}
  .poster .p-name{font-family:var(--katuri);font-size:22px;font-weight:800;line-height:1.14;text-shadow:0 2px 8px rgba(0,0,0,.65);word-break:keep-all}
  .poster .p-meta{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11px;opacity:.92;text-shadow:0 1px 3px rgba(0,0,0,.6);letter-spacing:.06em}
  .poster .p-desc{font-size:11.5px;opacity:.85;margin-top:7px;line-height:1.45;text-shadow:0 1px 3px rgba(0,0,0,.6);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  @media(max-width:520px){.poster .p-name{font-size:25px}.poster-head .ph-t{font-size:28px}}

  /* 기존 옷 = 앨범 그리드 */
  .item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:900px){.item-grid{grid-template-columns:repeat(3,1fr);gap:13px}}
  @media(max-width:560px){.item-grid{grid-template-columns:repeat(2,1fr);gap:11px}}
  .item-card{position:relative;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;background:var(--bg);border:1.5px solid var(--rule);aspect-ratio:3/4;transition:transform var(--transition),box-shadow var(--transition)}
  .item-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
  .item-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
  .item-card:hover img{transform:scale(1.05)}
  .item-card:hover .zoom-hint{opacity:1}
  .item-card .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;opacity:.32}
  .item-cap{position:absolute;left:0;right:0;bottom:0;padding:26px 14px 12px;background:linear-gradient(to top,rgba(0,0,0,.74),rgba(0,0,0,.30) 55%,transparent);color:#fff;pointer-events:none}
  .item-cap .name{font-size:14.5px;font-weight:700;line-height:1.25;text-shadow:0 1px 3px rgba(0,0,0,.45)}
  .item-cap .desc{font-size:11.5px;opacity:.9;margin-top:3px;line-height:1.35;text-shadow:0 1px 2px rgba(0,0,0,.45);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item-card.no-img .item-cap{background:linear-gradient(to top,var(--card) 30%,transparent);color:var(--text)}
  .item-card.no-img .item-cap .name{text-shadow:none}
  .item-card.no-img .item-cap .desc{text-shadow:none;opacity:.68}

  .dress-pager{display:flex;justify-content:center;gap:6px;margin-top:24px;flex-wrap:wrap}
  .pg{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--rule);background:var(--card);color:var(--text-mid);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center}
  .pg:hover{border-color:var(--main)}
  .pg.active{background:var(--main);color:#06384f;border-color:var(--main)}
  body.dark .pg.active{color:#0b2230}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:600;padding:24px}
  .lightbox.open{display:flex}
  .lightbox .inner{display:flex;flex-direction:column;align-items:center;max-width:92%;max-height:90%}
  .lightbox img{max-width:100%;max-height:74vh;border-radius:14px;box-shadow:0 12px 50px rgba(0,0,0,.5)}
  .lightbox-cap{margin-top:16px;text-align:center;color:#fff}
  .lightbox-cap .lb-name{font-size:17px;font-weight:700}
  .lightbox-cap .lb-desc{font-size:13.5px;opacity:.82;margin-top:5px;max-width:520px;line-height:1.5}
  .lightbox-close{position:absolute;top:18px;right:24px;color:#fff;font-size:36px;cursor:pointer;line-height:1;opacity:.85}
  .lightbox-close:hover{opacity:1}
</style>
</head>
<body>
<div class="page">
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo"><span class="lg-script">Uhi</span><span class="lg-sub">DAILY</span></a>
  <a href="../index.html" class="pill">메인</a>
  <a href="../profile/" class="pill">프로필</a>
  <a href="../schedule/" class="pill">일정</a>
  <a href="../song/" class="pill">노래책</a>
  <a href="index.html" class="pill active">옷장</a>
  <a href="../work/" class="pill">업보</a>
  <button class="theme-switch" id="tsw" type="button" aria-label="다크모드 전환"><span class="knob" id="kn">🌙</span></button>
</div></nav>
<div class="wrap">

  <div class="kicker"><span class="cat">WARDROBE · 👗</span><span class="date dbox"></span></div>
  <h1 class="headline">우히의 옷장</h1>
  <div class="byline">새로 올린 옷은 <b>포스터</b>로, 기존 옷은 <b>앨범</b>으로 봐요. 이미지를 누르면 크게 볼 수 있어요 💙</div>

  <div class="mode-seg" id="mode-seg">
    <button class="seg-btn active" data-mode="new">✨ 새 옷 (포스터)</button>
    <button class="seg-btn" data-mode="old">🗂 기존 옷</button>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div id="dress-body"><div class="spinner"></div></div>

</div>

</div><!-- /page -->
<footer>© 2026 우히 Official.<br>비즈니스 문의 — uhi1020118@gmail.com</footer>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <span class="lightbox-close" onclick="closeLb()">×</span>
  <div class="inner">
    <img id="lb-img" src="" referrerpolicy="no-referrer" alt="">
    <div class="lightbox-cap"><div class="lb-name" id="lb-name"></div><div class="lb-desc" id="lb-desc"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(s){ try{ const d=new Date(s); if(isNaN(d)) return ''; const y=String(d.getFullYear()).slice(2); const m=String(d.getMonth()+1).padStart(2,'0'); const dd=String(d.getDate()).padStart(2,'0'); return `${y}.${m}.${dd}`; }catch(e){ return ''; } }

  // 분류 (admin DRESS_CATS와 같은 값으로 맞추기)
  const CATS = [
    { key:'outfit', label:'의상' },
    { key:'hair',   label:'헤어' },
    { key:'lens',   label:'렌즈' },
  ];
  const LABELS = Object.fromEntries(CATS.map(c => [c.key, c.label]));
  const PER_PAGE = 9;

  function isNew(it){
    return (it.badges || []).some(function(b){
      var label = (b && (b.label != null ? b.label : b)) || '';
      return String(label).trim().toUpperCase() === 'NEW';
    });
  }

  let allItems = [];
  let curCat = CATS[0].key;
  let curMode = 'new';
  let curPage = 1;

  async function load(){
    try {
      const { data } = await db.from('dress_items').select('*').order('sort_order').order('created_at');
      allItems = data || [];
    } catch(e) { allItems = []; }
    document.querySelectorAll('#mode-seg .seg-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        curMode = btn.dataset.mode; curPage = 1;
        document.querySelectorAll('#mode-seg .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === curMode));
        buildTabs(); render();
      });
    });
    buildTabs();
    render();
  }

  function viewItems(){
    // 관리자(admin)와 동일하게 sort_order → created_at 순서를 따른다 (▲▼ 순서가 그대로 반영됨)
    var arr = allItems.filter(i => i.category === curCat && (curMode === 'new' ? isNew(i) : !isNew(i)));
    return arr.slice().sort(function(a,b){ return ((a.sort_order||0)-(b.sort_order||0)) || (new Date(a.created_at||0)-new Date(b.created_at||0)); });
  }

  function buildTabs(){
    const wrap = document.getElementById('cat-tabs');
    wrap.innerHTML = '';
    CATS.forEach(c => {
      const cnt = allItems.filter(i => i.category === c.key && (curMode === 'new' ? isNew(i) : !isNew(i))).length;
      const b = document.createElement('button');
      b.className = 'cat-tab' + (c.key === curCat ? ' active' : '');
      b.dataset.cat = c.key;
      b.innerHTML = `${esc(c.label)} <span class="cnt">${cnt}</span>`;
      b.onclick = () => { curCat = c.key; curPage = 1; buildTabs(); render(); };
      wrap.appendChild(b);
    });
  }

  function gridHTML(pageItems){
    return '<div class="item-grid">' + pageItems.map((item, idx) => {
      const hasImg = !!item.image_url;
      const inner = hasImg ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" referrerpolicy="no-referrer" loading="lazy">` : `<span class="ph">👗</span>`;
      return `<div class="item-card${hasImg?'':' no-img'}" data-idx="${idx}">
        ${hasImg?'<div class="zoom-hint">⤢</div>':''}
        ${inner}
        <div class="item-cap">
          <div class="name">${esc(item.name)}</div>
          ${item.description?`<div class="desc">${esc(item.description)}</div>`:''}
        </div>
      </div>`;
    }).join('') + '</div>';
  }

  function posterHTML(pageItems){
    return '<div class="poster-head"><div class="ph-t">NEW LOOKS</div><div class="ph-m">UHI · ' + esc(LABELS[curCat]||'') + '</div></div>'
      + '<div class="poster-grid">' + pageItems.map((it, idx) => {
        const img = it.image_url ? `<img src="${esc(it.image_url)}" alt="${esc(it.name)}" referrerpolicy="no-referrer" loading="lazy">` : '<span class="ph-ph">👗</span>';
        const cat = (it.category && LABELS[it.category]) ? `<span class="p-cat">${esc(LABELS[it.category])}</span>` : '';
        const date = it.created_at ? `<span class="p-date">${fmtDate(it.created_at)}</span>` : '';
        return `<div class="poster${it.image_url?'':' no-img'}" data-idx="${idx}">
          ${img}
          <div class="frame"></div>
          <div class="p-top">
            <span class="p-brand">UHI</span>
            <span class="p-new">✦ NEW</span>
          </div>
          <div class="p-bottom">
            ${cat}
            <div class="p-line"></div>
            <div class="p-name">${esc(it.name)}</div>
            ${date?`<div class="p-meta">${date}</div>`:''}
            ${it.description?`<div class="p-desc">${esc(it.description)}</div>`:''}
          </div>
        </div>`;
      }).join('') + '</div>';
  }

  function render(){
    const body = document.getElementById('dress-body');
    document.getElementById('cat-tabs').style.display = 'flex';
    const items = viewItems();
    if (!items.length){
      body.innerHTML = (curMode === 'new')
        ? '<div class="empty"><div class="empty-icon">✨</div>' + (LABELS[curCat]||'') + ' 새 옷이 아직 없어요<br><span style="font-size:12.5px;opacity:.85">admin에서 옷을 추가할 때 "✨ 새 옷으로 올리기"를 체크하면 여기 포스터로 떠요</span></div>'
        : '<div class="empty"><div class="empty-icon">👗</div>' + (LABELS[curCat]||'') + ' 항목이 아직 없어요</div>';
      return;
    }
    const totalPages = Math.max(1, Math.ceil(items.length / PER_PAGE));
    if (curPage > totalPages) curPage = 1;
    const pageItems = items.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);
    const main = (curMode === 'new') ? posterHTML(pageItems) : gridHTML(pageItems);
    let pager = '';
    if (totalPages > 1){
      pager = '<div class="dress-pager">';
      for (let i=1;i<=totalPages;i++) pager += `<button class="pg${i===curPage?' active':''}" data-pg="${i}">${i}</button>`;
      pager += '</div>';
    }
    body.innerHTML = main + pager;
    body.querySelectorAll('[data-idx]').forEach(el => {
      el.addEventListener('click', () => { const it = pageItems[+el.dataset.idx]; if (it && it.image_url) openLb(it); });
    });
    body.querySelectorAll('.pg').forEach(btn => {
      btn.addEventListener('click', () => { curPage = +btn.dataset.pg; render(); window.scrollTo(0,0); });
    });
  }

  function openLb(item){
    document.getElementById('lb-img').src = item.image_url;
    document.getElementById('lb-name').textContent = item.name || '';
    const d = document.getElementById('lb-desc');
    d.textContent = item.description || '';
    d.style.display = item.description ? 'block' : 'none';
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLb(); });

  load();
  (function(){var M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];var t=new Date();var s=t.getFullYear()+' · '+M[t.getMonth()]+' '+t.getDate();document.querySelectorAll('.dbox').forEach(function(e){e.textContent=s});})();
</script>
<script>
(function(){if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');var sw=document.getElementById('tsw'),kn=document.getElementById('kn');function r(){if(kn)kn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';}if(sw)sw.addEventListener('click',function(){document.body.classList.toggle('dark');localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');r();});r();})();
</script>
<script>(function(){var r=function(){document.body.classList.add("ready")};if(document.readyState==="complete")r();else window.addEventListener("load",r);setTimeout(r,1200);})();</script>
<script src="../fx.js"></script>
</body>
</html>

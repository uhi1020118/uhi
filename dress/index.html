<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우히 · 옷장</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/10/1020118/1020118.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── 헤더 ── */
    .dress-head { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .dress-head .ico { font-size:24px; }
    .dress-head .t { font-size:23px; font-weight:800; color:var(--main-dark); }
    .dress-sub { font-size:13px; color:var(--text-soft); margin-bottom:18px; line-height:1.6; }

    /* ── 분류 탭 (개수 뱃지 포함) ── */
    .cat-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .cat-tab { display:inline-flex; align-items:center; gap:7px; padding:9px 17px; border-radius:999px; border:1.5px solid var(--main-light); background:var(--card); color:var(--main-dark); font-size:14px; font-weight:600; cursor:pointer; transition:all var(--transition); }
    .cat-tab:hover { border-color:var(--main); }
    .cat-tab.active { background:var(--main); color:#fff; border-color:var(--main); box-shadow:var(--shadow); }
    .cat-tab .cnt { font-size:11px; font-weight:700; min-width:18px; height:18px; padding:0 5px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; background:var(--main-light); color:var(--main-dark); }
    .cat-tab.active .cnt { background:rgba(255,255,255,.28); color:#fff; }

    /* ── 갤러리 그리드: 세로 3:4, 4칸 (반응형 4→3→2) ── */
    .item-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    @media (max-width:900px){ .item-grid { grid-template-columns:repeat(3,1fr); gap:13px; } }
    @media (max-width:560px){ .item-grid { grid-template-columns:repeat(2,1fr); gap:11px; } }

    .item-card { position:relative; border-radius:var(--radius-md); overflow:hidden; cursor:pointer; background:var(--bg); border:1.5px solid var(--main-light); aspect-ratio:3/4; transition:transform var(--transition), box-shadow var(--transition); }
    .item-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-hover); }
    .item-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .item-card:hover img { transform:scale(1.05); }
    .item-card .ph { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:42px; opacity:.32; }

    /* 이름 오버레이 (이미지 하단 그라데이션) */
    .item-cap { position:absolute; left:0; right:0; bottom:0; padding:26px 14px 12px; background:linear-gradient(to top, rgba(0,0,0,.74), rgba(0,0,0,.30) 55%, transparent); color:#fff; pointer-events:none; }
    .item-cap .name { font-size:14.5px; font-weight:700; line-height:1.25; text-shadow:0 1px 3px rgba(0,0,0,.45); }
    .item-cap .desc { font-size:11.5px; opacity:.9; margin-top:3px; line-height:1.35; text-shadow:0 1px 2px rgba(0,0,0,.45); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    /* 이미지 없는 카드는 밝은 캡션 */
    .item-card.no-img .item-cap { background:linear-gradient(to top, var(--card) 30%, transparent); color:var(--text); }
    .item-card.no-img .item-cap .name { text-shadow:none; }
    .item-card.no-img .item-cap .desc { text-shadow:none; opacity:.68; }

    .badge-wrap { position:absolute; top:10px; left:10px; display:flex; gap:5px; flex-wrap:wrap; z-index:2; }
    .badge { font-size:10px; font-weight:800; letter-spacing:.04em; background:var(--main); color:#fff; padding:3px 9px; border-radius:999px; box-shadow:0 2px 8px rgba(0,0,0,.25); }

    .zoom-hint { position:absolute; top:10px; right:10px; width:28px; height:28px; border-radius:50%; background:rgba(0,0,0,.34); color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; opacity:0; transition:opacity var(--transition); z-index:2; }
    .item-card:hover .zoom-hint { opacity:1; }

    .empty { text-align:center; padding:56px 0; color:var(--text-soft); }
    .empty-icon { font-size:44px; margin-bottom:10px; opacity:.5; }

    /* ── 라이트박스 (클릭 확대) ── */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:600; padding:24px; }
    .lightbox.open { display:flex; }
    .lightbox .inner { display:flex; flex-direction:column; align-items:center; max-width:92%; max-height:90%; }
    .lightbox img { max-width:100%; max-height:74vh; border-radius:14px; box-shadow:0 12px 50px rgba(0,0,0,.5); }
    .lightbox-cap { margin-top:16px; text-align:center; color:#fff; }
    .lightbox-cap .lb-name { font-size:17px; font-weight:700; }
    .lightbox-cap .lb-desc { font-size:13.5px; opacity:.82; margin-top:5px; max-width:520px; line-height:1.5; }
    .lightbox-close { position:absolute; top:18px; right:24px; color:#fff; font-size:36px; cursor:pointer; line-height:1; opacity:.85; }
    .lightbox-close:hover { opacity:1; }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo"><span class="mini-badge"><i class="mc"></i></span> UHI</a>
  <a href="../index.html">프로필</a>
  <a href="../schedule/">일정</a>
  <a href="../song/">노래책</a>
  <a href="index.html" class="active">옷장</a>
  <a href="../work/">업보</a>
  <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환"><span class="knob" id="themeKnob">🌙</span></button>
</div></nav>

<div class="container stagger">
  <div class="card">
    <div class="dress-head"><span class="ico">👗</span><span class="t">옷장</span></div>
    <div class="dress-sub">우히의 헤어 · 렌즈 · 의상 모음이에요. 이미지를 누르면 크게 볼 수 있어요</div>
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="hair" onclick="filterCat('hair',this)">헤어 <span class="cnt">0</span></button>
      <button class="cat-tab" data-cat="lens" onclick="filterCat('lens',this)">렌즈 <span class="cnt">0</span></button>
      <button class="cat-tab" data-cat="outfit" onclick="filterCat('outfit',this)">의상 <span class="cnt">0</span></button>
    </div>
    <div id="dress-body"><div class="spinner"></div></div>
  </div>
</div>
<footer style="margin-top:-48px; color:#9fc3d4; font-size:12.5px; line-height:1.8; text-align:center;">© 2026 우히 Official.<br>비즈니스 문의 · uhi1020118@gmail.com</footer>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLb()">
  <span class="lightbox-close" onclick="closeLb()">×</span>
  <div class="inner">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-cap">
      <div class="lb-name" id="lb-name"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  const LABELS = { hair:'헤어', lens:'렌즈', outfit:'의상' };
  let allItems = [];
  let curCat = 'hair';

  async function load(){
    try {
      const { data } = await db.from('dress_items').select('*').order('sort_order').order('created_at');
      allItems = data || [];
    } catch(e) { allItems = []; }
    updateCounts();
    render();
  }

  function updateCounts(){
    document.querySelectorAll('.cat-tab').forEach(t=>{
      const c = t.dataset.cat;
      const n = allItems.filter(i => i.category === c).length;
      const cnt = t.querySelector('.cnt');
      if (cnt) cnt.textContent = n;
    });
  }

  function render(){
    const body = document.getElementById('dress-body');
    const items = allItems.filter(i => i.category === curCat);
    if (!items.length){
      body.innerHTML = '<div class="empty"><div class="empty-icon">👗</div>' + LABELS[curCat] + ' 항목이 아직 없어요</div>';
      return;
    }
    body.innerHTML = '<div class="item-grid">' + items.map((item, idx) => {
      const badges = (item.badges||[]).map(b => `<span class="badge">${esc(b.label||b)}</span>`).join('');
      const hasImg = !!item.image_url;
      const inner = hasImg
        ? `<img src="${esc(item.image_url)}" alt="${esc(item.name)}" loading="lazy">`
        : `<span class="ph">👗</span>`;
      return `<div class="item-card${hasImg?'':' no-img'}" data-idx="${idx}">
        ${badges?`<div class="badge-wrap">${badges}</div>`:''}
        ${hasImg?'<div class="zoom-hint">⤢</div>':''}
        ${inner}
        <div class="item-cap">
          <div class="name">${esc(item.name)}</div>
          ${item.description?`<div class="desc">${esc(item.description)}</div>`:''}
        </div>
      </div>`;
    }).join('') + '</div>';

    body.querySelectorAll('.item-card').forEach(card => {
      card.addEventListener('click', () => {
        const it = items[+card.dataset.idx];
        if (it && it.image_url) openLb(it);
      });
    });
  }

  function filterCat(cat, el){
    curCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function openLb(item){
    document.getElementById('lb-img').src = item.image_url;
    document.getElementById('lb-name').textContent = item.name || '';
    const d = document.getElementById('lb-desc');
    d.textContent = item.description || '';
    d.style.display = item.description ? 'block' : 'none';
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLb(); });

  load();
</script>
<script>
(function(){
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  var sw = document.getElementById('themeSwitch');
  var knob = document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'; }
  if (sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    refresh();
  });
  refresh();
})();
</script>
</body>
</html>
